version: "3.9"

services:
  # ──────────────────────────────────────
  # Agent — Production AI Agent (scalable)
  # ──────────────────────────────────────
  agent:
    build: .
    environment:
      - ENVIRONMENT=staging
      - APP_NAME=Production AI Agent
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env.local
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - agent_net

  # ──────────────────────────────────────
  # Redis — Session & Cost Guard storage
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - agent_net

  # ──────────────────────────────────────
  # Nginx — Load Balancer & API Gateway
  # ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    networks:
      - agent_net

networks:
  agent_net:
    driver: bridge

