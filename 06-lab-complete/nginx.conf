events { worker_connections 256; }

http {
    # Docker DNS resolver để tìm agent containers
    resolver 127.0.0.11 valid=10s;

    upstream agent_cluster {
        # Docker Compose tự tạo DNS "agent" → round-robin các instances
        server agent:8000;
        keepalive 16;
    }

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 80;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Served-By $upstream_addr always;

        # Rate limiting on /ask
        location /ask {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://agent_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 3;
        }

        location /health {
            proxy_pass http://agent_cluster/health;
            access_log off;
        }

        location /ready {
            proxy_pass http://agent_cluster/ready;
            access_log off;
        }

        location / {
            proxy_pass http://agent_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 3;
        }

        # Custom 429 error page
        error_page 429 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error": "Rate limit exceeded", "retry_after": 60}';
        }
    }
}
